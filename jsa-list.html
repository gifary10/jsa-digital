<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a1628">
  <title>JSA Digital — Daftar JSA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>

<div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

<header class="mobile-header">
  <div class="mobile-header-logo"><i class="bi bi-shield-check"></i></div>
  <div class="mobile-header-info">
    <div class="mobile-header-title">JSA Digital</div>
    <div class="mobile-header-subtitle">Daftar JSA</div>
  </div>
  <div class="mobile-header-right">
    <button class="mobile-icon-btn" onclick="location.href='jsa-form.html'"><i class="bi bi-plus-lg"></i></button>
    <button class="mobile-icon-btn" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
  </div>
</header>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-brand-logo"><i class="bi bi-shield-check"></i></div>
    <span class="sidebar-brand-text">JSA Digital</span>
  </div>
  <div class="sidebar-nav">
    <div class="nav-section-label">Main</div>
    <a href="index.html"    class="nav-item"><span class="nav-icon"><i class="bi bi-speedometer2"></i></span> Dashboard</a>
    <a href="company.html"  class="nav-item"><span class="nav-icon"><i class="bi bi-building"></i></span> Perusahaan</a>
    <a href="project.html"  class="nav-item"><span class="nav-icon"><i class="bi bi-clipboard-data"></i></span> Proyek</a>
    <a href="jsa-form.html" class="nav-item"><span class="nav-icon"><i class="bi bi-journal-plus"></i></span> Form JSA</a>
    <a href="jsa-list.html" class="nav-item active"><span class="nav-icon"><i class="bi bi-journal-check"></i></span> Daftar JSA</a>
    <a href="report.html"   class="nav-item"><span class="nav-icon"><i class="bi bi-file-earmark-pdf"></i></span> Laporan</a>
  </div>
  <div class="sidebar-footer"><i class="bi bi-database"></i> Local Storage v2.0</div>
</nav>

<main class="main-content">
  <div class="page-header no-print">
    <h2 class="page-title"><span class="title-icon"><i class="bi bi-journal-check"></i></span>Daftar JSA</h2>
    <a href="jsa-form.html" class="btn btn-primary btn-lg"><i class="bi bi-plus-lg"></i> JSA Baru</a>
  </div>

  <!-- Filters -->
  <div class="card">
    <div class="card-body" style="padding:12px;">
      <div class="row g-2">
        <div class="col-12 col-sm-4">
          <div class="input-search">
            <i class="bi bi-search"></i>
            <input type="text" class="form-control form-control-sm" id="searchJSA" placeholder="Cari nama, nomor dokumen..." oninput="loadJSAList()">
          </div>
        </div>
        <div class="col-6 col-sm-3">
          <select class="form-select form-select-sm" id="filterProject" onchange="loadJSAList()">
            <option value="">Semua Proyek</option>
          </select>
        </div>
        <div class="col-6 col-sm-2">
          <select class="form-select form-select-sm" id="filterStatus" onchange="loadJSAList()">
            <option value="">Semua Status</option>
            <option value="draft">Draft</option>
            <option value="review">Review</option>
            <option value="approved">Disetujui</option>
            <option value="rejected">Ditolak</option>
          </select>
        </div>
        <div class="col-12 col-sm-3">
          <select class="form-select form-select-sm" id="sortBy" onchange="loadJSAList()">
            <option value="newest">Terbaru</option>
            <option value="oldest">Terlama</option>
            <option value="name">Nama A-Z</option>
          </select>
        </div>
      </div>
      <div class="mt-2" style="font-size:.74rem;color:var(--text-3);" id="resultCount"></div>
    </div>
  </div>

  <!-- Desktop Table -->
  <div class="card d-none d-md-block">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>No. Dokumen</th>
              <th>Nama Pekerjaan</th>
              <th>Proyek</th>
              <th>Tanggal</th>
              <th>Status</th>
              <th class="text-center">Aksi</th>
            </tr>
          </thead>
          <tbody id="jsaTableBody">
            <tr><td colspan="6" class="text-center py-5 text-muted">Memuat data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Mobile Card List -->
  <div id="jsaCardList" class="d-md-none"></div>
</main>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="index.html"    class="bottom-nav-item"><i class="bi bi-speedometer2"></i>Beranda</a>
    <a href="project.html"  class="bottom-nav-item"><i class="bi bi-clipboard-data"></i>Proyek</a>
    <div class="bottom-nav-fab"><a href="jsa-form.html"><i class="bi bi-plus-lg"></i></a></div>
    <a href="jsa-list.html" class="bottom-nav-item active"><i class="bi bi-journal-check"></i>JSA</a>
    <a href="report.html"   class="bottom-nav-item"><i class="bi bi-file-earmark-pdf"></i>Laporan</a>
  </div>
</nav>

<script src="storage.js"></script>
<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  updateAllCompanyLogos();
  // Populate project filter
  const sel = document.getElementById('filterProject');
  getAllProjects().forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id; opt.textContent = p.name;
    sel.appendChild(opt);
  });
  // URL params
  const params = new URLSearchParams(window.location.search);
  if (params.get('project_id')) document.getElementById('filterProject').value = params.get('project_id');
  if (params.get('status'))     document.getElementById('filterStatus').value  = params.get('status');
  loadJSAList();
});

function loadJSAList() {
  let jsas = getAllJSA();
  const q     = (document.getElementById('searchJSA').value||'').toLowerCase();
  const projId = document.getElementById('filterProject').value;
  const status = document.getElementById('filterStatus').value;
  const sortBy = document.getElementById('sortBy').value;

  if (q)      jsas = jsas.filter(j => (j.job_name||'').toLowerCase().includes(q) || (j.document_number||'').toLowerCase().includes(q));
  if (projId) jsas = jsas.filter(j => j.project_id === projId);
  if (status) jsas = jsas.filter(j => j.status === status);

  if (sortBy === 'oldest') jsas.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
  else if (sortBy === 'name') jsas.sort((a,b) => (a.job_name||'').localeCompare(b.job_name||''));
  else jsas.sort((a,b) => new Date(b.updated_at||b.created_at) - new Date(a.updated_at||a.created_at));

  document.getElementById('resultCount').textContent = `${jsas.length} JSA ditemukan`;

  const statusMap = { draft:['secondary','Draft'], review:['warning','Review'], approved:['success','✓ Disetujui'], rejected:['danger','Ditolak'] };

  // Desktop table
  const tbody = document.getElementById('jsaTableBody');
  if (!jsas.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5"><div class="empty-state"><div class="empty-icon"><i class="bi bi-journal-x"></i></div><p>Tidak ada JSA ditemukan</p></div></td></tr>`;
  } else {
    tbody.innerHTML = jsas.map(j => {
      const proj = getProjectById(j.project_id);
      const [sc,sl] = statusMap[j.status] || ['secondary', j.status];
      return `<tr>
        <td><strong style="font-size:.76rem;color:var(--blue);">${j.document_number}</strong></td>
        <td><div style="font-weight:600;">${j.job_name}</div></td>
        <td>${proj?proj.name:'-'}</td>
        <td style="font-size:.76rem;">${formatDate(j.date)}</td>
        <td><span class="badge bg-${sc}">${sl}</span></td>
        <td class="text-center" style="white-space:nowrap;">
          <a href="jsa-form.html?jsa_id=${j.id}" class="btn btn-xs btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
          <a href="report.html?jsa_id=${j.id}" class="btn btn-xs btn-outline-info me-1"><i class="bi bi-file-text"></i></a>
          <button class="btn btn-xs btn-outline-danger" onclick="deleteJSA('${j.id}')"><i class="bi bi-trash"></i></button>
        </td>
      </tr>`;
    }).join('');
  }

  // Mobile cards
  const cardList = document.getElementById('jsaCardList');
  if (!jsas.length) {
    cardList.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="bi bi-journal-x"></i></div><p>Tidak ada JSA ditemukan</p></div>`;
  } else {
    cardList.innerHTML = jsas.map(j => {
      const proj = getProjectById(j.project_id);
      const [sc,sl] = statusMap[j.status] || ['secondary', j.status];
      return `<div class="card fade-in" style="border-left:3px solid var(--${sc==='success'?'success':sc==='warning'?'warning':sc==='danger'?'danger':'text-3'});">
        <div class="card-body" style="padding:13px;">
          <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;">
            <div style="flex:1;min-width:0;">
              <div style="font-size:.7rem;font-weight:700;color:var(--blue);margin-bottom:3px;">${j.document_number}</div>
              <div style="font-weight:700;font-size:.88rem;line-height:1.3;">${j.job_name}</div>
              <div style="font-size:.74rem;color:var(--text-3);margin-top:2px;">${proj?proj.name:'-'} &bull; ${formatDate(j.date)}</div>
            </div>
            <span class="badge bg-${sc}" style="flex-shrink:0;">${sl}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
            <span style="font-size:.72rem;color:var(--text-3);">Diperbarui ${timeAgo(j.updated_at||j.created_at)}</span>
          </div>
          <div style="display:flex;gap:7px;padding-top:9px;border-top:1px solid var(--border);">
            <a href="jsa-form.html?jsa_id=${j.id}" class="btn btn-xs btn-outline-primary"><i class="bi bi-pencil"></i> Edit</a>
            <a href="report.html?jsa_id=${j.id}" class="btn btn-xs btn-outline-info"><i class="bi bi-file-text"></i> Laporan</a>
            <button class="btn btn-xs btn-outline-danger ms-auto" onclick="deleteJSA('${j.id}')"><i class="bi bi-trash"></i></button>
          </div>
        </div>
      </div>`;
    }).join('');
  }
}

function deleteJSA(id) {
  const j = getJSAById(id);
  if (!confirm(`Hapus JSA "${j?.document_number}"?\nTidak bisa dibatalkan!`)) return;
  deleteJSAById(id);
  loadJSAList();
  showToast('JSA dihapus.', 'warning');
}
</script>
</body>
</html>
