<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a1628">
  <title>JSA Digital — Proyek</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>

<div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

<header class="mobile-header">
  <div class="mobile-header-logo"><i class="bi bi-shield-check"></i></div>
  <div class="mobile-header-info">
    <div class="mobile-header-title">JSA Digital</div>
    <div class="mobile-header-subtitle">Proyek</div>
  </div>
  <div class="mobile-header-right">
    <button class="mobile-icon-btn" onclick="showProjectForm()" title="Proyek Baru"><i class="bi bi-plus-lg"></i></button>
    <button class="mobile-icon-btn" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
  </div>
</header>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-brand-logo"><i class="bi bi-shield-check"></i></div>
    <span class="sidebar-brand-text">JSA Digital</span>
  </div>
  <div class="sidebar-nav">
    <div class="nav-section-label">Main</div>
    <a href="index.html"    class="nav-item"><span class="nav-icon"><i class="bi bi-speedometer2"></i></span> Dashboard</a>
    <a href="company.html"  class="nav-item"><span class="nav-icon"><i class="bi bi-building"></i></span> Perusahaan</a>
    <a href="project.html"  class="nav-item active"><span class="nav-icon"><i class="bi bi-clipboard-data"></i></span> Proyek</a>
    <a href="jsa-form.html" class="nav-item"><span class="nav-icon"><i class="bi bi-journal-plus"></i></span> Form JSA</a>
    <a href="jsa-list.html" class="nav-item"><span class="nav-icon"><i class="bi bi-journal-check"></i></span> Daftar JSA</a>
    <a href="report.html"   class="nav-item"><span class="nav-icon"><i class="bi bi-file-earmark-pdf"></i></span> Laporan</a>
  </div>
  <div class="sidebar-footer"><i class="bi bi-database"></i> Local Storage v2.0</div>
</nav>

<main class="main-content">
  <div class="page-header no-print">
    <h2 class="page-title"><span class="title-icon"><i class="bi bi-clipboard-data"></i></span>Proyek</h2>
    <button class="btn btn-primary btn-lg" onclick="showProjectForm()"><i class="bi bi-plus-lg"></i> Proyek Baru</button>
  </div>

  <!-- Slide-down Form -->
  <div id="projectFormCard" class="card" style="display:none;">
    <div class="card-header" id="formCardTitle"><i class="bi bi-plus-circle"></i> Tambah Proyek Baru</div>
    <div class="card-body">
      <form id="projectForm">
        <input type="hidden" id="projectId">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Nama Proyek <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="projectName" required placeholder="Pembangunan Gedung A">
          </div>
          <div class="col-sm-6">
            <label class="form-label">Client / Pemberi Kerja</label>
            <input type="text" class="form-control" id="client" placeholder="PT. Client Utama">
          </div>
          <div class="col-sm-6">
            <label class="form-label">Lokasi Proyek</label>
            <input type="text" class="form-control" id="location" placeholder="Kota, Provinsi">
          </div>
          <div class="col-sm-6">
            <label class="form-label">PIC / Penanggung Jawab</label>
            <input type="text" class="form-control" id="pic" placeholder="Nama PIC">
          </div>
          <div class="col-sm-6">
            <label class="form-label">Status</label>
            <select class="form-select" id="statusField">
              <option value="aktif">Aktif</option>
              <option value="tertunda">Tertunda</option>
              <option value="selesai">Selesai</option>
            </select>
          </div>
          <div class="col-sm-6">
            <label class="form-label">Tanggal Mulai</label>
            <input type="date" class="form-control" id="startDate">
          </div>
          <div class="col-sm-6">
            <label class="form-label">Tanggal Selesai</label>
            <input type="date" class="form-control" id="endDate">
          </div>
          <div class="col-12">
            <label class="form-label">Deskripsi</label>
            <textarea class="form-control" id="description" rows="2" placeholder="Deskripsi singkat pekerjaan..."></textarea>
          </div>
        </div>
        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Simpan</button>
          <button type="button" class="btn btn-outline-secondary" onclick="hideProjectForm()">Batal</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Filters -->
  <div class="card">
    <div class="card-body" style="padding:12px;">
      <div class="row g-2">
        <div class="col-8 col-sm-5">
          <div class="input-search">
            <i class="bi bi-search"></i>
            <input type="text" class="form-control form-control-sm" id="searchProj" placeholder="Cari proyek..." oninput="loadTable()">
          </div>
        </div>
        <div class="col-4 col-sm-3">
          <select class="form-select form-select-sm" id="filterStatus" onchange="loadTable()">
            <option value="">Semua</option>
            <option value="aktif">Aktif</option>
            <option value="tertunda">Tertunda</option>
            <option value="selesai">Selesai</option>
          </select>
        </div>
        <div class="col-12 col-sm-4 text-sm-end">
          <span id="projCount" style="font-size:.76rem;color:var(--text-3);"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Desktop Table -->
  <div class="card d-none d-md-block">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>Nama Proyek</th>
              <th>Client</th>
              <th>Lokasi</th>
              <th>PIC</th>
              <th>Status</th>
              <th>JSA</th>
              <th class="text-center">Aksi</th>
            </tr>
          </thead>
          <tbody id="projectTableBody">
            <tr><td colspan="7" class="text-center py-5 text-muted">Belum ada proyek</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Mobile Card List -->
  <div id="projectCardList" class="d-md-none"></div>
</main>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="index.html"    class="bottom-nav-item"><i class="bi bi-speedometer2"></i>Beranda</a>
    <a href="project.html"  class="bottom-nav-item active"><i class="bi bi-clipboard-data"></i>Proyek</a>
    <div class="bottom-nav-fab"><a href="jsa-form.html"><i class="bi bi-plus-lg"></i></a></div>
    <a href="jsa-list.html" class="bottom-nav-item"><i class="bi bi-journal-check"></i>JSA</a>
    <a href="report.html"   class="bottom-nav-item"><i class="bi bi-file-earmark-pdf"></i>Laporan</a>
  </div>
</nav>

<script src="storage.js"></script>
<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  updateAllCompanyLogos();
  loadTable();
  document.getElementById('projectForm').addEventListener('submit', function(e) { e.preventDefault(); saveProject(); });
});

function loadTable() {
  let projects = getAllProjects();
  const q = (document.getElementById('searchProj').value || '').toLowerCase();
  const fs = document.getElementById('filterStatus').value;
  if (q)  projects = projects.filter(p => (p.name||'').toLowerCase().includes(q) || (p.client||'').toLowerCase().includes(q));
  if (fs) projects = projects.filter(p => p.status === fs);
  projects = projects.reverse();
  document.getElementById('projCount').textContent = `${projects.length} proyek`;

  const scls = { aktif:'success', selesai:'secondary', tertunda:'warning' };

  // Desktop table
  const tbody = document.getElementById('projectTableBody');
  if (!projects.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-5"><div class="empty-state"><div class="empty-icon"><i class="bi bi-clipboard-x"></i></div><p>Tidak ada proyek ditemukan</p></div></td></tr>';
  } else {
    tbody.innerHTML = projects.map(p => {
      const jc = getJSAByProject(p.id).length;
      const hasJSA = jc > 0;
      return `<tr>
        <td><strong>${p.name}</strong>${p.description?`<br><small class="text-muted">${p.description.substring(0,50)}${p.description.length>50?'...':''}</small>`:''}</td>
        <td>${p.client||'-'}</td>
        <td>${p.location||'-'}</td>
        <td>${p.pic||'-'}</td>
        <td><span class="badge bg-${scls[p.status]||'secondary'}">${p.status}</span></td>
        <td><a href="jsa-list.html?project_id=${p.id}" class="badge bg-info text-decoration-none">${jc} JSA</a></td>
        <td class="text-center" style="white-space:nowrap;">
          <button class="btn btn-xs btn-outline-warning me-1" onclick="editProject('${p.id}')"><i class="bi bi-pencil"></i></button>
          ${hasJSA ? '' : `<a href="jsa-form.html?project_id=${p.id}" class="btn btn-xs btn-outline-primary me-1"><i class="bi bi-journal-plus"></i></a>`}
          <button class="btn btn-xs btn-outline-danger" onclick="deleteProject('${p.id}')"><i class="bi bi-trash"></i></button>
        </td>
      </tr>`;
    }).join('');
  }

  // Mobile cards
  const cardList = document.getElementById('projectCardList');
  if (!projects.length) {
    cardList.innerHTML = '<div class="empty-state"><div class="empty-icon"><i class="bi bi-clipboard-x"></i></div><p>Tidak ada proyek ditemukan</p></div>';
  } else {
    cardList.innerHTML = projects.map(p => {
      const jc = getJSAByProject(p.id).length;
      const hasJSA = jc > 0;
      return `<div class="card" style="border-left:4px solid var(--${p.status==='aktif'?'success':p.status==='selesai'?'text-3':'warning'});">
        <div class="card-body" style="padding:14px;">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;">
            <div style="flex:1;min-width:0;">
              <div style="font-weight:700;font-size:.9rem;margin-bottom:3px;">${p.name}</div>
              <div style="font-size:.76rem;color:var(--text-3);">${p.client||''} ${p.location?'&bull; '+p.location:''}</div>
            </div>
            <span class="badge bg-${scls[p.status]||'secondary'}">${p.status}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            ${p.pic?`<span style="font-size:.74rem;color:var(--text-3);"><i class="bi bi-person me-1"></i>${p.pic}</span>`:''}
            ${p.start_date?`<span style="font-size:.74rem;color:var(--text-3);"><i class="bi bi-calendar3 me-1"></i>${formatDate(p.start_date)}</span>`:''}
          </div>
          <div style="display:flex;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);">
            <button class="btn btn-xs btn-outline-warning" onclick="editProject('${p.id}')"><i class="bi bi-pencil"></i> Edit</button>
            ${hasJSA ? '' : `<a href="jsa-form.html?project_id=${p.id}" class="btn btn-xs btn-outline-primary"><i class="bi bi-journal-plus"></i> Buat JSA</a>`}
            <a href="jsa-list.html?project_id=${p.id}" class="btn btn-xs btn-ghost"><i class="bi bi-journal-check"></i> ${jc} JSA</a>
            <button class="btn btn-xs btn-outline-danger ms-auto" onclick="deleteProject('${p.id}')"><i class="bi bi-trash"></i></button>
          </div>
        </div>
      </div>`;
    }).join('');
  }
}

function showProjectForm(data = null) {
  const card = document.getElementById('projectFormCard');
  document.getElementById('projectForm').reset();
  document.getElementById('projectId').value = '';
  if (data) {
    document.getElementById('formCardTitle').innerHTML = '<i class="bi bi-pencil-square"></i> Edit Proyek';
    document.getElementById('projectId').value    = data.id;
    document.getElementById('projectName').value  = data.name          || '';
    document.getElementById('client').value       = data.client        || '';
    document.getElementById('location').value     = data.location      || '';
    document.getElementById('pic').value          = data.pic           || '';
    document.getElementById('startDate').value    = data.start_date    || '';
    document.getElementById('endDate').value      = data.end_date      || '';
    document.getElementById('statusField').value  = data.status        || 'aktif';
    document.getElementById('description').value  = data.description   || '';
  } else {
    document.getElementById('formCardTitle').innerHTML = '<i class="bi bi-plus-circle"></i> Tambah Proyek Baru';
  }
  card.style.display = 'block';
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function hideProjectForm() { document.getElementById('projectFormCard').style.display = 'none'; }
function editProject(id)   { const p = getProjectById(id); if (p) showProjectForm(p); }

function saveProject() {
  const id = document.getElementById('projectId').value || ('proj_' + Date.now());
  const project = {
    id, company_id:'comp_main',
    name:        document.getElementById('projectName').value.trim(),
    client:      document.getElementById('client').value.trim(),
    location:    document.getElementById('location').value.trim(),
    pic:         document.getElementById('pic').value.trim(),
    start_date:  document.getElementById('startDate').value,
    end_date:    document.getElementById('endDate').value,
    status:      document.getElementById('statusField').value,
    description: document.getElementById('description').value.trim(),
    updated_at:  new Date().toISOString()
  };
  const projects = getAllProjects();
  const idx = projects.findIndex(p => p.id === id);
  if (idx >= 0) { projects[idx] = project; }
  else { project.created_at = new Date().toISOString(); projects.push(project); }
  saveData(STORAGE_KEYS.PROJECTS, projects);
  addAudit(idx >= 0 ? 'UPDATE_PROJECT' : 'CREATE_PROJECT', project.name);
  hideProjectForm();
  loadTable();
  showToast('Proyek berhasil disimpan!', 'success');
}

function deleteProject(id) {
  const p = getProjectById(id);
  if (!confirm(`Hapus proyek "${p?.name}"?\n\nSemua JSA terkait juga akan dihapus.`)) return;
  saveData(STORAGE_KEYS.PROJECTS, getAllProjects().filter(x => x.id !== id));
  saveData(STORAGE_KEYS.JSA, getAllJSA().filter(j => j.project_id !== id));
  addAudit('DELETE_PROJECT', `Proyek ${p?.name||id} dihapus`);
  loadTable();
  showToast('Proyek dihapus.', 'warning');
}
</script>
</body>
</html>
